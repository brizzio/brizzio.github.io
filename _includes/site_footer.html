<footer class="border-t border-white/10">
  <div class="mx-auto grid max-w-6xl gap-6 px-6 py-8 md:grid-cols-[1fr_auto] md:items-end">
    <div>
      <h2 class="text-base font-semibold text-white">{{ site.data.site.footer.title }}</h2>
      <p class="mt-2 max-w-xl text-sm leading-7 text-white/60">{{ site.data.site.footer.text }}</p>
    </div>
    <div class="flex flex-wrap gap-4">
      {% for item in site.data.site.social %}
        <a class="text-sm text-sand transition hover:text-white" href="{{ item.url }}">{{ item.label }}</a>
      {% endfor %}
    </div>
  </div>
</footer>
