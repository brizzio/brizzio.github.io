<header class="border-b border-white/10 bg-ink/80 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
    <a class="flex items-center gap-3 text-sm font-semibold uppercase tracking-[0.2em] text-sand" href="{{ '/' | relative_url }}">
      <span class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-white/10 bg-white/5 text-base tracking-normal">FS</span>
      <span>{{ site.data.site.brand.name }}</span>
    </a>
    <nav class="hidden items-center gap-8 md:flex">
      {% for item in site.data.site.navigation %}
        <a class="text-sm transition {% if page.url == item.url %}text-white{% else %}text-white/70 hover:text-white{% endif %}" href="{{ item.url | relative_url }}">
          {{ item.label }}
        </a>
      {% endfor %}
    </nav>
  </div>
</header>
