{% for section in site.data.home.sections %}
  <section class="mx-auto max-w-6xl px-6 py-10 md:py-14">
    <div class="grid gap-8 lg:grid-cols-[0.78fr_1.22fr]">
      <div>
        <h2 class="font-display text-3xl text-white md:text-4xl">{{ section.title }}</h2>
        <p class="mt-4 max-w-xl text-base leading-8 text-white/70">{{ section.body }}</p>
      </div>
      <div class="grid gap-5 md:grid-cols-3">
        {% for card in section.cards %}
          <article class="rounded-3xl border border-white/10 bg-white/5 p-6">
            <h3 class="text-lg font-semibold text-white">{{ card.title }}</h3>
            <p class="mt-3 text-sm leading-7 text-white/70">{{ card.text }}</p>
          </article>
        {% endfor %}
      </div>
    </div>
  </section>
{% endfor %}
