<section class="mx-auto max-w-6xl px-6 py-10 md:py-14">
  <div class="flex items-end justify-between gap-6">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.28em] text-sky-300">Blog</p>
      <h2 class="mt-3 font-display text-3xl text-white md:text-4xl">Ultimos artigos</h2>
    </div>
    <a class="hidden text-sm font-semibold text-sand transition hover:text-white md:inline-block" href="{{ '/blog/' | relative_url }}">Ver todos</a>
  </div>
  <div class="mt-8 grid gap-5 md:grid-cols-3">
    {% for post in site.posts limit: 3 %}
      <article class="rounded-3xl border border-white/10 bg-white/5 p-6">
        <p class="text-xs uppercase tracking-[0.2em] text-white/40">{{ post.date | date: "%d/%m/%Y" }}</p>
        <h3 class="mt-3 text-xl font-semibold text-white">
          <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </h3>
        <p class="mt-3 text-sm leading-7 text-white/70">{{ post.excerpt | strip_html | truncate: 120 }}</p>
      </article>
    {% endfor %}
  </div>
</section>
