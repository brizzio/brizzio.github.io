{% assign cta = site.data.home.cta %}

<section class="mx-auto max-w-6xl px-6 py-12 md:py-16">
  <div class="overflow-hidden rounded-[2rem] border border-white/10 bg-gradient-to-r from-white/10 to-white/5 p-8 md:p-10">
    <div class="grid gap-6 md:grid-cols-[1fr_auto] md:items-end">
      <div>
        <h2 class="font-display text-3xl text-white md:text-4xl">{{ cta.title }}</h2>
        <p class="mt-4 max-w-2xl text-base leading-8 text-white/70">{{ cta.body }}</p>
      </div>
      <div>
        <a class="inline-flex items-center justify-center rounded-full bg-coral px-6 py-3 text-sm font-semibold text-white transition hover:bg-coral-soft" href="{{ cta.url | relative_url }}">
          {{ cta.label }}
        </a>
      </div>
    </div>
  </div>
</section>
