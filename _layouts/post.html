---
layout: default
---

<article class="mx-auto max-w-3xl px-6 py-16 md:py-20">
  <div class="rounded-[2rem] border border-white/10 bg-white/5 p-8 md:p-12">
    <p class="text-xs uppercase tracking-[0.24em] text-white/40">{{ page.date | date: "%d/%m/%Y" }}</p>
    <h1 class="mt-3 font-display text-4xl text-white md:text-5xl">{{ page.title }}</h1>
    <div class="prose-shell mt-10">
      {{ content }}
    </div>
  </div>
</article>
